---
layout: default
---

<main class="page-main" id="main-content">
  <header class="archive-header">
    <p style="font-size:0.85rem;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.35rem;">Category</p>
    <h1>📁 {{ page.title }}</h1>
    <p>{{ page.posts.size }} post{% if page.posts.size != 1 %}s{% endif %} in &ldquo;{{ page.title }}&rdquo;</p>
  </header>

  <div class="archive-grid">
    {% for post in page.posts %}
      {% include post-card.html post=post %}
    {% endfor %}
  </div>
</main>
