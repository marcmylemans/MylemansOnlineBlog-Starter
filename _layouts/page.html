---
layout: default
---

<main class="page-main" id="main-content">
  <div class="post-layout">
    <article>
      <header class="post-header">
        <h1 class="post-header__title">{{ page.title | default: site.title | escape }}</h1>
        {% if page.description %}
        <p style="color:var(--color-text-muted);font-size:1.05rem;margin-top:0.5rem;">{{ page.description }}</p>
        {% endif %}
      </header>

      <div class="post-content">
        {{ content }}
      </div>
    </article>

    {% if page.toc != false %}
      {% include toc.html content=content %}
    {% endif %}
  </div>
</main>
